theme:
  name: material
  logo: images/logos/ndp-logo.png
  features:
    - content.code.copy
    - navigation.top
  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/eye-outline
        name: Switch to dark mode
    - scheme: slate
      primary: white
      accent: indigo
      toggle:
        icon: material/eye
        name: Switch to light mode
repo_url: https://github.com/national-data-platform

extra:
  social:
    - icon: fontawesome/brands/instagram 
      link: https://www.instagram.com/nationaldataplatform/
    - icon: fontawesome/brands/x-twitter 
      link: https://x.com/natldataplat
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/national-data-platform/

markdown_extensions:
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg